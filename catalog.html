<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>PearPrint | Catalog</title>
            
            <link rel="stylesheet" href="src/style.css">
        </head>
        
        <style>
            html {
                overflow-y: scroll;
            }
            .hero {
                padding: 50px 0;
            }

            .hero .content .heroText {
                text-align: center;
            }

            .itemGrid {
                margin-top: 25px;
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 20px;
                align-items: stretch;
            }

            /* Card */
            .item {
                /* background: #f2ece9; */
                /* background: #e0d3cb; */
                border-radius: 12px;
                padding: 26px;
                cursor: pointer;
                /* box-shadow: 0px 0px 20px rgba(90, 57, 62, 0.1); */
            
                display: flex;
                flex-direction: column;
                align-items: center;
            
                text-align: center;
            }

            /* Image */
            .item img {
                max-width: 225.6px;
                height: 220px;
                object-fit: contain;
                margin-bottom: 20px;
                flex-shrink: 0;
            }

            /* Text */
            .item .text {
                display: flex;
                flex-direction: column;
                gap: 4px;
                padding: 0 6px;
            
                flex-grow: 1;
            }

            /* Title */
            .item h3 {
                font-size: clamp(17px, 2.2vw, 21px);
                line-height: 1.15;
                margin: 0;
                word-break: break-word;
            }

            /* Subtext */
            .item p {
                font-size: clamp(13px, 1.8vw, 15px);
                line-height: 1.35;
                margin: 0;
                color: #555;
                word-break: break-word;
            }
        </style>

        <body>
            <header>
                <div class="content">
                <a href="index.html"><img src="src/img/logo.svg"></a>
                <nav>
                    <a href="index.html">Home</a>
                    <a href="catalog.html" class="active">Catalog</a>
                    <a href="contact.html">Contact</a>
                </nav>
                </div>
            </header>

            <div class="hero">
                <div class="content">
                <div class="heroText">
                    <h1>Catalog</h1>
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Et aperiam adipisci obcaecati nostrum molestias perspiciatis, non illum inventore iusto quod, nesciunt nihil officiis dolores sunt rerum alias minus illo pariatur.</p>
                </div>
                <div class="itemGrid"></div></div>
            </div>

            <script src="./src/data.js"></script>
            <script src="catalog.js"></script>
    </body>
</html>
