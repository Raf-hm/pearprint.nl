<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PearPrint | Contact</title>

    <link rel="stylesheet" href="src/style.css">

    <style>
        html {
            overflow-y: scroll;
        }

        * {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--L);
            color: var(--D);
        }

        /* CONTACT SECTION */

        .contact {
            padding: 50px 20px 60px;
            display: flex;
            justify-content: center;
        }

        .contact-container {
            width: 100%;
            max-width: 700px;
            text-align: center;
        }

        .contact-container h1 {
            font-size: 56px;
            margin-bottom: 10px;
        }

        .subtitle {
            margin-bottom: 40px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-row {
            display: flex;
            gap: 15px;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px 18px;
            border-radius: 30px;
            border: none;
            background: white;
            font-size: 15px;
            box-sizing: border-box;
        }

        textarea {
            border-radius: 20px;
            resize: none;
            height: 140px;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: var(--D);
            color: white;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        /* CONTACT INFO */

        .contact-info {
            padding: 0px 20px 70px;
        }

        .info-container {
            max-width: 800px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            text-align: center;
        }

        .info-box {
            padding: 20px;
        }

        .info-box p {
            white-space: nowrap;
            opacity: 0.8;
            line-height: 1.6;
        }

        .icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--D);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
        }

        .icon img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .info-box h3 {
            margin-bottom: 10px;
            font-size: 16px;
            letter-spacing: 1px;
        }

        /* MOBILE */

        @media (max-width: 768px) {

            .input-row {
                flex-direction: column;
            }

            .info-container {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .contact-container h1 {
                font-size: 36px;
            }

            .subtitle {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="content">
            <a href="index.html">
                <img src="src/img/logo.svg">
            </a>

            <nav id="navMenu">
                <a href="index.html">Home</a>
                <a href="catalog.html">Catalog</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>

            <div class="hamburger" id="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <section class="contact">
        <div class="contact-container">
            <h1>Contact Us</h1>
            <p class="subtitle">
                Got a project, question or remark? Get in touch!
            </p>

            <form name="contactForm" method="POST" data-netlify="true" action="/contact.html?succes">
                <div class="input-row">
                    <input name="email" type="email" placeholder="Enter your email" required>
                    <input name="name" type="text" placeholder="Enter your name" required>
                </div>

                <textarea name="message" placeholder="Your message..." required></textarea>

                <button type="submit">SEND MESSAGE</button>
            </form>
        </div>
    </section>

    <section class="contact-info">
        <div class="info-container">

            <div class="info-box">
                <div class="icon">
                    <img src="./src/img/icons/telephone.png" alt="Phone">
                </div>
                <h3>Phone</h3>
                <p>+31 6 29435245</p>
            </div>

            <div class="info-box">
                <div class="icon">
                    <img src="./src/img/icons/email.png" alt="Email">
                </div>
                <h3>E-mail</h3>
                <p>contact.pearprint@gmail.com</p>
            </div>

            <div class="info-box">
                <div class="icon">
                    <img src="./src/img/icons/location.png" alt="Location">
                </div>
                <h3>Location</h3>
                <p>Sittard, NL</p>
            </div>

        </div>
    </section>

    <script src="navbar.js"></script>
</body>

</html>
