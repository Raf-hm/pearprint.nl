<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | PearPrint</title>

    <link rel="stylesheet" href="src/style.css">

    <style>
        /* ----------------------- */
        /* BASIS STYLING */

        body {
            overflow-x: hidden;
        }

        .productWrapper {
			margin-top: 50px;
			position: absolute;
			left: 50%;
			transform: translate(-50%);
        }

        /* Flex container voor horizontale centrering */
        .productWrapper .content {
            display: flex;
            justify-content: center; /* horizontaal gecentreerd */
            width: 100%;
        }

        .product {
			/* background-color: #13b013; */
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center; /* verticale centrering afbeelding */
        }

        .product img {
            max-width: 450px;
            width: auto;
            height: 100%; /* hoogte via JS */
            object-fit: cover;
            display: block;
            justify-self: center; /* horizontaal in grid cel */
        }

        #productInfo {
            width: 410px;
        }

        .title {
            font-size: 42px;
            font-weight: 700;
            margin: 0 0 12px;
        }

        .price {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 24px;
        }

        .colors {
            display: grid;
            grid-template-columns: repeat(10, 32px);
            gap: 10px;
            margin: 10px 0 25px;
        }

        .color {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            border: 2px solid #8e8e8e;
            cursor: pointer;
            transition: border 0.15s;
            position: relative;
        
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .color:hover {
            transform: scale(1.1);
        }

        .color.selected {
            border: 2px solid #111;
        }

        .color .check {
            color: white;
            font-size: 16px;
            font-weight: bold;
            display: none;

            text-shadow: 0 0 3px #000
        }

        .color.selected .check {
            display: block;
        }


        .sizes {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: max-content;
            gap: 5px;
            margin: 12px 0 30px;
        }

        .size {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border: 2px solid #d0d0d0;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s ease;
            background: white;
        }

        .size:hover {
            border-color: #888;
            background: #f6f6f6;
        }

        .size.selected {
            border: 2px solid #111;
            font-weight: 600;
        }

        .cart {
            background: #13b013;
            color: white;
            border: none;
            padding: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }

        /* --------------------- */
        /* RESPONSIVE SCALING */
        @media (max-width: 1020px) {
            .product {
                transform: scale(0.8);
                transform-origin: top center; /* scaling startpunt */
            }
        }

        @media (max-width: 820px) {
            .product {
                grid-template-columns: 1fr;
                gap: 30px;
                transform: scale(1);
            }

            .product img {
                max-width: 100%;
                height: auto;
            }

            #productInfo {
                width: 100%;
            }
        }

		@media (max-width: 550px) {
            .product {
                grid-template-columns: 1fr;
                gap: 30px;
                transform: scale(0.8);
            }

            .product img {
                max-width: 100%;
                height: auto;
            }

            #productInfo {
                width: 100%;
            }
        }

		@media (max-width: 420px) {
            .product {
                grid-template-columns: 1fr;
                gap: 30px;
                transform: scale(0.7);
            }
        }


        
        #quoteModal{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.45);
            display:none;
            align-items:center;
            justify-content:center;
            z-index:1000;
        }

        .modalBox{
            background:#ece3dd;       /* achtergrond aangepast */
            padding:34px;             /* consistent met eerste pagina */
            width:460px;
            border-radius:8px;
            box-sizing:border-box;
        }

        .modalHeader{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;       /* consistent margin */
        }

        .modalTitle{
            font-size:28px;
            font-weight:700;
        }

        .closeModal{
            font-size:22px;
            cursor:pointer;
        }

        .modalContent .question{
            margin-bottom:28px;       /* consistent margin */
        }

        .hint{
            font-size:13px;
            color:#777;
            margin:4px 0 14px;
        }

        #printLocations{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:8px;
        }

        #printLocations label{
            display:flex;
            align-items:center;
            gap:8px;
            cursor:pointer;
        }

        #quantity{
            width:100%;
            padding:12px;
            border:1px solid #d0d0d0;
            border-radius:4px;
            font-size:15px;
        }

        .sendQuote{
            background:#13b013;
            color:white;
            border:none;
            padding:16px;
            width:100%;
            font-weight:600;
            cursor:pointer;
            border-radius:6px;
        }

        @media (max-width:700px){
            .modalBox{
                width:90%;
            }
            #printLocations{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="content">
            <a href="index.html"><img src="src/img/logo.svg"></a>
            <nav>
                <a href="index.html">Home</a>
                <a href="catalog.html">Catalog</a>
                <a href="quote.html">Quote</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <div class="productWrapper">
        <!-- <div class="content"> -->
            <div class="product">
                <img id="image">
                <div id="productInfo">
                    <div class="title" id="title"></div>
                    <div class="price" id="price"></div>
                    <div>
                        <strong>Kleur</strong>
                        <div class="colors" id="colors"></div>
                    </div>
                    <div>
                        <strong>Maat</strong>
                        <div class="sizes" id="sizes"></div>
                    </div>
                    <button class="cart">Get a quote in 30s!</button>
                </div>
            </div>
        <!-- </div> -->
    </div>

    <div id="quoteModal">

        <div class="modalBox">

            <div class="modalHeader">
                <div class="modalTitle">Request a quote</div>
                <div class="closeModal">✕</div>
            </div>

            <div class="modalContent">

                <div class="question">
                    <strong>Where do you want the item printed?</strong>
                    <p class="hint">Multiple options allowed</p>

                    <div id="printLocations"></div>
                </div>

                <div class="question">
                    <strong>How many items do you need?</strong>
                    <input type="number" id="quantity" min="1" placeholder="Amount">
                </div>

                <button class="sendQuote">Request quote</button>

            </div>

        </div>

    </div>

    <script src="./src/data.js"></script>
    <script src="product.js"></script>
</body>

</html>
