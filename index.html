<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PearPrint | Home</title>

    <link rel="stylesheet" href="src/style.css">

    <style>
        html {
            overflow-y: scroll;
        }

        .hero {
            padding-top: 80px;
        }

        .hero .content {
            display: flex;
            justify-content: space-between;
        }

        .heroText {
            max-width: 550px;
            margin: auto 0 auto;
        }

        .heroText p {
            margin: 20px 0;
        }

        .heroImage img {
            width: 500px;
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .why .content h3 {
            margin: 80px 0 0;
            text-align: center;
        }

        .scroller {
            height: 120px;
            width: 100%;
            margin-top: 20px;
            background-color: rgba(0, 0, 0, 0.03);
            display: flex;
        }

        .scroller .item {
            filter: grayscale(100%);
            max-height: 80px;
            max-width: 80px;
            margin: auto 20px auto 20px;
        }
    </style>
</head>

<body>

    <header>
        <div class="content">
            <a href="index.html">
                <img src="src/img/logo.svg">
            </a>

            <nav id="navMenu">
                <a href="index.html" class="active">Home</a>
                <a href="catalog.html">Catalog</a>
                <a href="contact.html">Contact</a>
            </nav>

            <div class="hamburger" id="hamburger" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <div class="hero">
        <div class="content">

            <div class="heroText">
                <h1>High quality,<br>Low costs.</h1>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Velit iure, atque magnam, nesciunt </p>
                <a href="catalog.html"><button>catalog</button></a>
            </div>

            <div class="heroImage">
                <img src="src/img/image.png" alt="Office Image">
            </div>

        </div>
    </div>

    <div class="why">
        <div class="content">
            <!-- Currently empty -->
        </div>
    </div>

    <script src="navbar.js"></script>
</body>

</html>
